<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loca-LLAMA — Local LLM Mac Analyzer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Loca-LLAMA</h1>
    <p class="subtitle">Local LLM Apple Mac Analyzer</p>
    <nav>
      <button data-tab="compatibility" class="active">Compatibility</button>
      <button data-tab="models">Models</button>
      <button data-tab="local">Local Models</button>
      <button data-tab="hub">HuggingFace</button>
      <button data-tab="benchmark">Benchmark</button>
      <button data-tab="memory">Memory</button>
    </nav>
  </header>

  <main>
    <section id="tab-compatibility" class="tab-content active">
      <h2>Compatibility Check</h2>
      <div class="controls">
        <label>Hardware
          <select id="hw-select"><option value="">Loading…</option></select>
        </label>
        <label>Quantization
          <select id="quant-select"><option value="">Loading…</option></select>
        </label>
        <label>Family
          <select id="compat-family-select"><option value="">All Families</option></select>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="only-fits-check" checked> Only show models that fit
        </label>
        <button class="btn" id="analyze-btn" disabled>Analyze</button>
      </div>
      <div id="compat-summary"></div>
      <div id="compat-results"></div>
      <div id="compat-detail" class="detail-panel" style="display:none;"></div>
    </section>

    <section id="tab-models" class="tab-content">
      <h2>Model Database</h2>
      <div class="controls">
        <label>Family
          <select id="family-select"><option value="">All Families</option></select>
        </label>
      </div>
      <div id="models-table"></div>
    </section>

    <section id="tab-local" class="tab-content">
      <h2>Local Models</h2>
      <div class="controls">
        <button class="btn" id="scan-btn">Scan Default Paths</button>
        <label>Custom Directory
          <input type="text" id="custom-dir-input" placeholder="/path/to/models" style="min-width:250px">
        </label>
        <button class="btn" id="scan-custom-btn" style="background:var(--bg-card);color:var(--text);border:1px solid var(--border)">Scan Custom</button>
      </div>
      <div id="scan-summary"></div>
      <div id="scan-results"></div>
    </section>

    <section id="tab-hub" class="tab-content">
      <h2>HuggingFace Search</h2>
      <div class="controls">
        <label>Search
          <input type="text" id="hub-search-input" placeholder="llama 8b gguf…" style="min-width:250px">
        </label>
        <label>Format
          <select id="hub-format-select">
            <option value="">All</option>
            <option value="gguf">GGUF</option>
            <option value="mlx">MLX</option>
          </select>
        </label>
        <label>Sort
          <select id="hub-sort-select">
            <option value="downloads">Downloads</option>
            <option value="likes">Likes</option>
            <option value="lastModified">Recent</option>
          </select>
        </label>
      </div>
      <div id="hub-results"></div>
      <div id="hub-files" class="detail-panel" style="display:none;"></div>
    </section>

    <section id="tab-benchmark" class="tab-content">
      <h2>Benchmark</h2>
      <div class="controls">
        <button class="btn" id="detect-runtimes-btn">Detect Runtimes</button>
        <label>Runtime
          <select id="bench-runtime-select" disabled><option value="">Detect runtimes first…</option></select>
        </label>
        <label>Model
          <select id="bench-model-select" disabled><option value="">Select runtime first…</option></select>
        </label>
        <label>Prompt
          <select id="bench-prompt-select">
            <option value="default">Default</option>
            <option value="coding">Coding</option>
            <option value="reasoning">Reasoning</option>
            <option value="creative">Creative</option>
          </select>
        </label>
        <label>Runs
          <input type="number" id="bench-runs-input" value="3" min="1" max="10" style="width:60px">
        </label>
        <button class="btn" id="bench-start-btn" disabled>Start Benchmark</button>
      </div>
      <div id="bench-status"></div>
      <div id="bench-results"></div>
    </section>

    <section id="tab-memory" class="tab-content">
      <h2>Memory Monitor</h2>

      <div class="memory-gauge">
        <div class="memory-bar">
          <div class="memory-fill" id="memory-fill" style="width:0%"></div>
        </div>
        <div class="memory-gauge-label" id="memory-gauge-label">-- / -- GB</div>
      </div>

      <div class="memory-stats" id="memory-stats">
        <div class="detail-item">
          <span class="label">Used</span>
          <span class="value" id="mem-used">--</span>
        </div>
        <div class="detail-item">
          <span class="label">Free</span>
          <span class="value" id="mem-free">--</span>
        </div>
        <div class="detail-item">
          <span class="label">Total</span>
          <span class="value" id="mem-total">--</span>
        </div>
        <div class="detail-item">
          <span class="label">Usage</span>
          <span class="value" id="mem-pct">--</span>
        </div>
        <div class="detail-item">
          <span class="label">Pressure</span>
          <span class="value" id="mem-pressure"><span class="pressure-badge">--</span></span>
        </div>
      </div>

      <div class="memory-chart-container">
        <h3>Usage History</h3>
        <canvas id="memory-chart" height="200"></canvas>
      </div>

      <div class="memory-report" id="memory-report">
        <h3>Memory Report</h3>
        <p class="placeholder">Loading report...</p>
      </div>
    </section>
  </main>

  <footer>
    Loca-LLAMA v0.1.0 &middot; localhost:8000
  </footer>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
